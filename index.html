<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<article data-testid="test-todo-card" class="card">

  <!-- Title -->
  <h3 data-testid="test-todo-title" id="title">
    Finish HNG Task
  </h3>

  <!-- Description -->
  <p data-testid="test-todo-description">
    Build a clean and functional todo card component
  </p>

  <!-- Priority + Status -->
  <div class="row">
    <span class="badge priority" data-testid="test-todo-priority">
      High
    </span>

    <span class="badge status" data-testid="test-todo-status" id="status">
      In Progress
    </span>
  </div>

  <!-- Due Date -->
  <time 
    data-testid="test-todo-due-date" 
    datetime="2026-03-01T18:00:00Z">
    Due Mar 1, 2026
  </time>

  <!-- Time Remaining -->
  <p data-testid="test-todo-time-remaining" id="time">
    Loading...
  </p>

  <!-- Checkbox -->
  <label class="checkbox">
    <input 
      type="checkbox" 
      data-testid="test-todo-complete-toggle" 
      id="checkbox"
    />
    Mark as complete
  </label>

  <!-- Tags -->
  <ul data-testid="test-todo-tags" class="tags">
    <li data-testid="test-todo-tag-work">work</li>
    <li data-testid="test-todo-tag-urgent">urgent</li>
  </ul>

  <!-- Actions -->
  <div class="actions">
    <button data-testid="test-todo-edit-button">Edit</button>
    <button data-testid="test-todo-delete-button" class="delete">
      Delete
    </button>
  </div>

</article>

<script src="script.js"></script>

</body>
</html>
