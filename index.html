<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<article data-testid="test-todo-card" class="card">

  <!-- Priority indicator -->
  <div data-testid="test-todo-priority-indicator" id="priorityIndicator"></div>

  <!-- Title -->
  <h3 data-testid="test-todo-title" id="title">
    Finish HNG Stage 1a
  </h3>

  <!-- Description (FIXED ACCESSIBILITY) -->
  <div
    id="descBox"
    data-testid="test-todo-collapsible-section"
    role="region"
    aria-labelledby="desc"
  >
    <p data-testid="test-todo-description" id="desc">
      Build an advanced todo card with editing, status control, expand/collapse, and time tracking.
    </p>
  </div>

  <!-- Expand button -->
  <button 
    id="expandBtn"
    data-testid="test-todo-expand-toggle"
    aria-expanded="false"
    aria-controls="descBox">
    Expand
  </button>

  <!-- Meta Row -->
  <div class="row">
    <span data-testid="test-todo-priority" id="priority">High</span>
    <span data-testid="test-todo-status" id="status">In Progress</span>
  </div>

  <!-- Status Control -->
  <select data-testid="test-todo-status-control" id="statusControl">
    <option>Pending</option>
    <option selected>In Progress</option>
    <option>Done</option>
  </select>

  <!-- Time -->
  <time 
    data-testid="test-todo-due-date" 
    id="dueDate">
  </time>

  <p 
    data-testid="test-todo-time-remaining" 
    id="time"
    aria-live="polite">
  </p>

  <span data-testid="test-todo-overdue-indicator" id="overdue"></span>

  <!-- Checkbox (FIXED LABEL ACCESSIBILITY) -->
  <div class="checkbox">
    <input 
      type="checkbox"
      id="checkbox"
      data-testid="test-todo-complete-toggle"
    />
    <label for="checkbox">Mark as complete</label>
  </div>

  <!-- Tags -->
  <ul data-testid="test-todo-tags" class="tags">
    <li data-testid="test-todo-tag-work">work</li>
    <li data-testid="test-todo-tag-urgent">urgent</li>
  </ul>

  <!-- Actions -->
  <div class="actions">
    <button data-testid="test-todo-edit-button" id="editBtn">Edit</button>
    <button data-testid="test-todo-delete-button" class="delete">Delete</button>
  </div>

  <!-- Edit Form -->
  <div data-testid="test-todo-edit-form" id="editForm" hidden>

    <label for="editTitle">Title</label>
    <input data-testid="test-todo-edit-title-input" id="editTitle">

    <label for="editDesc">Description</label>
    <textarea data-testid="test-todo-edit-description-input" id="editDesc"></textarea>

    <label for="editPriority">Priority</label>
    <select data-testid="test-todo-edit-priority-select" id="editPriority">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <label for="editDate">Due Date</label>
    <input 
      type="datetime-local"
      data-testid="test-todo-edit-due-date-input"
      id="editDate"
    />

    <div class="form-actions">
      <button data-testid="test-todo-save-button" id="saveBtn">Save</button>
      <button data-testid="test-todo-cancel-button" id="cancelBtn">Cancel</button>
    </div>

  </div>

</article>

<script src="script.js"></script>
</body>
</html>
